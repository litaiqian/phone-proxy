<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队登录 - 猫妈妈自动化</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { max-width: 380px; width: 100%; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .login-header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; border-radius: 16px 16px 0 0; padding: 24px; text-align: center; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <h4 class="mb-1">🐱 团队管理站点</h4>
        <small class="opacity-75">使用团队专属账号登录</small>
    </div>
    <div class="card-body p-4 bg-white" style="border-radius: 0 0 16px 16px;">
        {% if flash_messages %}
            {% for category, message in flash_messages %}
                <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show py-2" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        <form method="post" action="/team/login">
            <div class="mb-3">
                <label class="form-label small fw-bold">团队账号</label>
                <input type="text" name="username" class="form-control" placeholder="输入团队登录账号" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">密码</label>
                <input type="password" name="password" class="form-control" placeholder="输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">登 录</button>
        </form>
        <div class="text-center mt-3">
            <small class="text-muted">团队凭据由主站管理员分配</small>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
