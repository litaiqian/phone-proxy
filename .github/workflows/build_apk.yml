name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3 python3-pip python3-dev \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev libltdl-dev

      - name: Install Buildozer
        run: pip3 install --break-system-packages buildozer cython

      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer/android/platform
          key: android-platform-${{ hashFiles('phone_proxy_app/buildozer.spec') }}

      - name: Install Android SDK build-tools
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk
          cd $HOME/.buildozer/android/platform/android-sdk
          if [ ! -f cmdline-tools.zip ]; then
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
            unzip -qo cmdline-tools.zip
          fi
          yes | ./cmdline-tools/bin/sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk \
            "build-tools;31.0.0" "platforms;android-31" "platform-tools" 2>/dev/null || true

      - name: Build APK
        working-directory: phone_proxy_app
        run: buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: phone_proxy-debug
          path: phone_proxy_app/bin/*.apk
          retention-days: 30
